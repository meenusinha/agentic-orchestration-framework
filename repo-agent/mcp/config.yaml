# Repo agent configuration — the ONLY file you edit per repo.
#
# After editing, run:  python ../orchestrator/setup.py
# (That generates the .vscode/mcp.json with all peer servers wired up.)

# Must match the name used in orchestrator/mcp/config.yaml
repo_name: my-repo

# Human-readable name shown in routing output and Copilot chat
display_name: My Repo

# Path(s) to source code to index. Relative to repo root, absolute, or a glob pattern.
# Glob example (all src folders under module subdirectories): src_path: ./modules/*/src
# Multiple explicit paths:
#   src_path:
#     - ./module-a/src
#     - ./module-b/src
# Set to null to skip source indexing entirely.
src_path: ./src

# Additional file extensions to index (on top of the defaults above)
# extra_extensions: [".graphql", ".proto", ".thrift"]

# Path(s) to documentation folders containing .md files. Supports glob patterns
# and lists, same as src_path. All .md files are searched recursively.
# Glob example: knowledge_path: ./modules/*/docs
# Multiple paths:
#   knowledge_path:
#     - ./knowledge
#     - ./modules/*/docs
knowledge_path: ./knowledge

# Number of results returned per query from docs and code collections (default: 3)
top_k: 3

# Similarity threshold — maximum L2 distance to accept a result (lower = tighter).
# With normalised embeddings: ~0.5 is tight, ~1.0 is moderate, null = no filtering.
# Keyword search always runs in addition and is unaffected by this threshold.
similarity_threshold: null
